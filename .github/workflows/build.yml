name: Build

on:
  push:
    branches: [main]
  pull_request:

# A newer push supersedes any still-running build of the same branch.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS (universal)
            os: macos-14
            cmake_extra: -DSPASYNTH_UNIVERSAL_BINARY=ON
          - name: Windows (x64)
            os: windows-2022
            cmake_extra: ""
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DSPASYNTH_COPY_PLUGIN=OFF ${{ matrix.cmake_extra }}

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: spasynth-${{ runner.os }}
          path: |
            build/SPASynth_artefacts/**/VST3/**
            build/SPASynth_artefacts/**/AU/**
            build/SPASynth_artefacts/**/Standalone/**
          if-no-files-found: error
