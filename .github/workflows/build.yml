name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# A newer push supersedes any still-running build of the same branch.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Windows is the only platform we cannot build locally, so it runs on every
  # push. It bills at 2x and finishes in ~17 min.
  windows:
    name: Windows (x64)
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DSPASYNTH_COPY_PLUGIN=OFF

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Read version
        id: version
        shell: bash
        run: echo "version=$(sed -n 's/^project(SPASynth VERSION \([0-9.]*\).*/\1/p' CMakeLists.txt)" >> "$GITHUB_OUTPUT"

      - name: Build installer (Windows)
        shell: cmd
        # /O (output dir) is resolved relative to the working directory (repo
        # root), NOT the .iss location like the Source paths — so use an
        # absolute workspace path or the upload finds nothing.
        run: '"%ProgramFiles(x86)%\Inno Setup 6\ISCC.exe" /DAppVersion=${{ steps.version.outputs.version }} /DArtefacts=..\..\build\SPASynth_artefacts\Release /O"%GITHUB_WORKSPACE%\dist\installers" installers\windows\SPASynth.iss'

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: spasynth-Windows
          path: |
            build/SPASynth_artefacts/**/VST3/**
            build/SPASynth_artefacts/**/Standalone/**
          if-no-files-found: error

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: spasynth-installer-Windows
          path: dist/installers/*
          if-no-files-found: error

  # macOS ships from a local signed + notarized build, so this job is only a
  # clean-machine compile check. It runs ON DEMAND (Actions tab -> Run workflow)
  # because macOS runners bill at 10x and would otherwise drain the private
  # repo's monthly Actions minutes on every push.
  macos:
    name: macOS (universal)
    runs-on: macos-14
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DSPASYNTH_COPY_PLUGIN=OFF -DSPASYNTH_UNIVERSAL_BINARY=ON

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Read version
        id: version
        shell: bash
        run: echo "version=$(sed -n 's/^project(SPASynth VERSION \([0-9.]*\).*/\1/p' CMakeLists.txt)" >> "$GITHUB_OUTPUT"

      - name: Build installer (macOS, unsigned)
        run: ./installers/macos/build_installer.sh build dist/installers

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: spasynth-macOS
          path: |
            build/SPASynth_artefacts/**/VST3/**
            build/SPASynth_artefacts/**/AU/**
            build/SPASynth_artefacts/**/Standalone/**
          if-no-files-found: error

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: spasynth-installer-macOS
          path: dist/installers/*
          if-no-files-found: error
