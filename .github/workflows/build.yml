name: Build

on:
  push:
    branches: [main]
  pull_request:

# A newer push supersedes any still-running build of the same branch.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS (universal)
            os: macos-14
            cmake_extra: -DSPASYNTH_UNIVERSAL_BINARY=ON
          - name: Windows (x64)
            os: windows-2022
            cmake_extra: ""
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DSPASYNTH_COPY_PLUGIN=OFF ${{ matrix.cmake_extra }}

      - name: Build
        run: cmake --build build --config Release --parallel

      # Installers ship unsigned from CI; Mike signs/notarizes locally for
      # store releases (see installers/macos/build_installer.sh).
      - name: Read version
        id: version
        shell: bash
        run: echo "version=$(sed -n 's/^project(SPASynth VERSION \([0-9.]*\).*/\1/p' CMakeLists.txt)" >> "$GITHUB_OUTPUT"

      - name: Build installer (macOS)
        if: runner.os == 'macOS'
        run: ./installers/macos/build_installer.sh build dist/installers

      - name: Build installer (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        # /O (output dir) is resolved relative to the working directory (repo
        # root), NOT the .iss location like the Source paths — so the old
        # ..\..\dist\installers wrote the .exe two levels ABOVE the workspace
        # and the upload found nothing. Use an absolute workspace path.
        run: '"%ProgramFiles(x86)%\Inno Setup 6\ISCC.exe" /DAppVersion=${{ steps.version.outputs.version }} /DArtefacts=..\..\build\SPASynth_artefacts\Release /O"%GITHUB_WORKSPACE%\dist\installers" installers\windows\SPASynth.iss'

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: spasynth-${{ runner.os }}
          path: |
            build/SPASynth_artefacts/**/VST3/**
            build/SPASynth_artefacts/**/AU/**
            build/SPASynth_artefacts/**/Standalone/**
          if-no-files-found: error

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: spasynth-installer-${{ runner.os }}
          path: dist/installers/*
          if-no-files-found: error
